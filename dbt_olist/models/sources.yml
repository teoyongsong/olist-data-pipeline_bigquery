version: 2

sources:
  - name: raw_olist
    description: Raw Olist e-commerce tables loaded from CSV into BigQuery
    database: "{{ target.project }}"
    schema: "{{ var('raw_schema') }}"
    tables:
      - name: customers
      - name: orders
      - name: order_items
      - name: order_payments
      - name: products
      - name: sellers
      - name: geolocation
      - name: order_reviews
